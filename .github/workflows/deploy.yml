name: Compilar y Enviar a Docker Hub

on:
  push:
    branches:
      - main  # Se ejecuta cada vez que subes cambios a la rama main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compilar imagen y subir a Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devilmaystrike:latest

      - name: Avisar a Render para actualizar la Web
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"