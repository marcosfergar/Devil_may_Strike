{% extends "plantilla_base.html" %} 
{% block title %}DevilMayStrike{% endblock%}

{% block style %}
<link
  rel="stylesheet"
  href="{{ url_for('static', filename='css/home-login.css') }}"
/>
{% endblock %} 

{% block content %}
<div id="titulo">
  <img
    src="{{ url_for('static', filename='img/dms-logo.png') }}"
    alt="logo-dmStrike"
  />
</div>

<div class="menu-botones">
  <input class="btns-menu" id="Start" type="button" value="Start" />
  <input class="btns-menu" id="Ranking" type="button" value="Ranking" />

  <a href="{{ url_for('home_route.biblioteca_dmc') }}">
    <input class="btns-menu" id="biblioteca-dmc" type="button" value="Saga" />

  <input class="btns-menu" id="Logout" type="button" value="Cerrar Sesion" />

{% endblock %}
